<section class="page">
  <div class="page-header">
    <app-page-title title="Lawyers"></app-page-title>
    <div class="clients-toolbar">
      <div class="search-box" *ngIf="!loading && !errorMessage">
        <i class="fa fa-search search-icon" aria-hidden="true"></i>
        <input class="search" type="search" placeholder="Search" (input)="onSearch($event.target.value)" />
      </div>

      <app-button label="Add New Lawyer" icon="fa-plus" [link]="['/create-lawyer']" variant="primary"></app-button>
    </div>
  </div>

  <div class="clients-filters" *ngIf="!loading && !errorMessage">
    <button class="filter-pill" [class.active]="selectedFilter === 'all'" (click)="applyFilter('all')">
      <span class="filter-label">All Lawyers</span>
      <span class="filter-count">{{ totalClients }}</span>
    </button>

    <button class="filter-pill" [class.active]="selectedFilter === 'active'" (click)="applyFilter('active')">
      <span class="filter-label">Active Lawyers</span>
      <span class="filter-count">{{ activeClients }}</span>
    </button>

    <button class="filter-pill" [class.active]="selectedFilter === 'inactive'" (click)="applyFilter('inactive')">
      <span class="filter-label">Inactive Lawyers</span>
      <span class="filter-count">{{ inactiveClients }}</span>
    </button>
  </div>

  <div *ngIf="loading" class="loading">Loading lawyers...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div *ngIf="!loading && !errorMessage">
    <table class="clients-table" *ngIf="filteredLawyers.length > 0">
      <thead>
        <tr>
          <th class="col-account">
            <button class="th-sort" (click)="toggleSort('name')" [attr.aria-sort]="ariaSort('name')">
              <span>Account</span>
              <span class="chev-wrap" aria-hidden="true">
                <i class="chev chev-default fas fa-sort"></i>
                <i class="chev chev-asc fas fa-sort-up"></i>
                <i class="chev chev-desc fas fa-sort-down"></i>
              </span>
            </button>
          </th>
          <th class="col-email">Email</th>
          <th class="col-register">
            <button class="th-sort" (click)="toggleSort('register')" [attr.aria-sort]="ariaSort('register')">
              <span>Reg. Number</span>
              <span class="chev-wrap" aria-hidden="true">
                <i class="chev chev-default fas fa-sort"></i>
                <i class="chev chev-asc fas fa-sort-up"></i>
                <i class="chev chev-desc fas fa-sort-down"></i>
              </span>
            </button>
          </th>
          <th class="col-date">
            <button class="th-sort" (click)="toggleSort('createdAt')" [attr.aria-sort]="ariaSort('createdAt')">
              <span>Date</span>
              <span class="chev-wrap" aria-hidden="true">
                <i class="chev chev-default fas fa-sort"></i>
                <i class="chev chev-asc fas fa-sort-up"></i>
                <i class="chev chev-desc fas fa-sort-down"></i>
              </span>
            </button>
          </th>
          <th class="col-status">Status</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let l of filteredLawyers; let i = index">
          <td class="col-account">
            <div class="account-name">{{ l.name }}</div>
          </td>
          <td class="col-email">{{ l.email || '—' }}</td>
          <td class="col-register">{{ l.professionalRegister || '—' }}</td>
          <td class="col-date">{{ l.createdAt ? (l.createdAt | date:'dd MMM, yyyy') : '—' }}</td>
          <td class="col-status">
            <span class="badge" [ngClass]="{ 'badge-active': l.isActive, 'badge-inactive': !l.isActive }">
              {{ l.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="col-actions">
            <button class="btn-ellipsis" aria-label="Actions" [routerLink]="['/lawyers', l.id]">⋯</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="filteredLawyers.length === 0" class="empty">No lawyers to display.</div>

    <div class="pagination">
      <button (click)="goToPage(1)" [disabled]="currentPage === 1">First</button>
      <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">Previous</button>

      <span>Page {{ currentPage }} of {{ totalPages }}</span>

      <span>
        Go to:
            <input
              type="number"
              min="1"
              [max]="totalPages"
              [(ngModel)]="goToPageNumber"
              class="goto-input"
            />
        <button (click)="goToPage(goToPageNumber)">Go</button>
      </span>

      <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">Next</button>
      <button (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages">Last</button>
    </div>
    
  </div>
</section>
