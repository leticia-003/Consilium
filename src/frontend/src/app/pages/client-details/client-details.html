<section class="page">
  <div class="page-header">
    <app-page-title [title]="client ? client.name : ''"></app-page-title>
    <div class="actions">
      <app-button label="Back to list" icon="fa-arrow-left" [link]="['/clients']" variant="secondary"></app-button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Loading client...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && client" class="client-details">
    <table class="details-table">
      <tbody>
        <tr><th>ID</th><td>{{ client.id }}</td></tr>
        <tr><th>Name</th><td>{{ client.name }}</td></tr>
        <tr><th>Email</th><td>{{ client.email || '—' }}</td></tr>
        <tr><th>NIF</th><td>{{ client.nif || '—' }}</td></tr>
        <tr><th>Address</th><td>{{ client.address || '—' }}</td></tr>
        <tr><th>Status</th><td>{{ client.status || (client.isActive ? 'ACTIVE' : 'INACTIVE') }}</td></tr>
      </tbody>
    </table>
  </div>
</section>
