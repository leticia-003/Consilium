<a
  class="btn"
  [ngClass]="[variantClass]"
  *ngIf="link; else buttonTpl"
  [routerLink]="link"
  >
  <i *ngIf="icon" class="fa" [ngClass]="icon" aria-hidden="true"></i>
  <span *ngIf="label">{{ label }}</span>
</a>

<ng-template #buttonTpl>
  <button class="btn" [ngClass]="[variantClass]">
    <i *ngIf="icon" class="fa" [ngClass]="icon" aria-hidden="true"></i>
    <span *ngIf="label">{{ label }}</span>
  </button>
</ng-template>
