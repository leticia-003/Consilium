<div class="msg-backdrop" role="dialog" aria-modal="true" (click)="onBackdropClick($event)">
  <div class="msg-panel">
    <div class="msg-header">
      <h3 class="msg-title">New Message</h3>
      <button class="close-btn" (click)="onCancel()" title="Close">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <div class="msg-body">
      <!-- Metadata Fields (Readonly) -->
      <div class="meta-row">
        <div class="meta-group">
          <label>From:</label>
          <input type="text" [value]="senderName" disabled readonly class="meta-input" />
        </div>
        <div class="meta-group">
          <label>To:</label>
          <input type="text" [value]="recipientName" disabled readonly class="meta-input" />
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-group full-width">
          <label>Process:</label>
          <input type="text" [value]="processName" disabled readonly class="meta-input" />
        </div>
      </div>

      <!-- User Input Fields -->
      <div class="input-group">
        <label for="msg-subject">Subject</label>
        <input
          id="msg-subject"
          type="text"
          [(ngModel)]="subject"
          placeholder="Enter the subject"
          class="user-input subject-input"
        />
      </div>

      <div class="form-group">
        <label for="body">Message</label>
        <textarea
          id="body"
          [(ngModel)]="body"
          name="body"
          rows="6"
          required
          maxlength="240"
          class="user-input body-input"
        ></textarea>
        <div class="char-count" [class.error]="body.length > 240">{{ body.length }} / 240</div>
      </div>
    </div>

    <div class="msg-footer">
      <button class="btn btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn btn-send" [disabled]="!isValid()" (click)="onSend()">
        Send
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
