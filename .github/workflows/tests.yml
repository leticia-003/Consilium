name: Run Tests

on:
  push:
    branches:
      - '**'  # Run on push to any branch
  pull_request:
    branches:
      - '**'

jobs:
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore C.sln
      
      - name: Build
        run: dotnet build C.sln --no-restore --configuration Release
      
      - name: Run tests
        run: dotnet test C.sln --no-build --configuration Release --verbosity normal

  frontend-tests:
    name: Frontend Tests (Angular)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'  # Use LTS version instead of odd-numbered
          cache: 'npm'
          cache-dependency-path: './src/frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./src/frontend
      
      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./src/frontend

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          
          if [ "${{ needs.backend-tests.result }}" != "success" ] || [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Some tests failed!"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
