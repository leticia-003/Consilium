# .github/workflows/deploy.yml
name: CI/CD Pipeline (Test and Deploy)

on:
  push:
    branches:
      - main        # Para Production
      - development # Para Staging

jobs:
  # ------ JOB 1: TESTAR O CÓDIGO ------
  # test:
  #   name: Run Unit Tests
  #   runs-on: ubuntu-latest
    
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
        
  #     - name: Setup .NET
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: '8.0.x' # (ou 9.0 se estiveres a usar)

  #     # (Se tiveres um projeto de testes)
  #     # - name: Run .NET Tests
  #     #   run: dotnet test src/Consilium.Tests/Consilium.Tests.csproj

  #     # (Podes adicionar testes de frontend aqui também)
  #     # - name: Install Frontend Dependencies
  #     #   run: npm install --prefix src/frontend
  #     # - name: Run Frontend Tests
  #     #   run: npm test --prefix src/frontend -- --watch=false

  # ------ JOB 2: DEPLOY DO BACKEND ------
  deploy-backend:
    name: Deploy Backend
    # needs: test # <-- SÓ CORRE SE O JOB 'test' PASSAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Production Deploy (main)
        if: github.ref == 'refs/heads/main'
        run: curl "${{ secrets.RENDER_HOOK_API_PROD }}"

      - name: Trigger Development Deploy (development)
        if: github.ref == 'refs/heads/development'
        run: curl "${{ secrets.RENDER_HOOK_API_DEVELPOPMENT }}"

  # ------ JOB 3: DEPLOY DO FRONTEND ------
  deploy-frontend:
    name: Deploy Frontend
    # needs: test # <-- SÓ CORRE SE O JOB 'test' PASSAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Production Deploy (main)
        if: github.ref == 'refs/heads/main'
        run: curl "${{ secrets.RENDER_HOOK_WEB_PROD }}"

      - name: Trigger Development Deploy (development)
        if: github.ref == 'refs/heads/development'
        run: curl "${{ secrets.RENDER_HOOK_WEB_DEVELPOPMENT }}"