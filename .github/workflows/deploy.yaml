# .github/workflows/deploy-backend.yml
name: Deploy Backend to Render

on:
  push:
    branches:
      - main    # Para Production
      - development # Para Staging

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }} # A sua chave principal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instala a CLI do Render
      - name: Install Render CLI
        run: curl -fsSL https://raw.githubusercontent.com/render-oss/cli/refs/heads/main/bin/install.sh | sh
      
      # Autentica a CLI com a sua chave
      - name: Authenticate Render CLI
        run: render login --api-key "${{ env.API_KEY }}"

      # Deploy de Produção (main)
      - name: Deploy to Production (main)
        if: github.ref == 'refs/heads/main'
        # O comando 'render deploy' constrói, faz push e avisa o serviço
        run: render deploy --id ${{ secrets.RENDER_DEPLOY_ID_PROD }} --clear-cache

      # Deploy de Staging (develop)
      - name: Deploy to Staging (develop)
        if: github.ref == 'refs/heads/develop'
        run: render deploy --id ${{ secrets.RENDER_DEPLOY_ID_DEVLOPMENT }} --clear-cache