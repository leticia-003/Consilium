# .github/workflows/deploy.yml
name: CD - Deploy

on:
  push:
    branches:
      - main
      - development

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Production Deploy (main)
        if: github.ref == 'refs/heads/main'
        run: curl "${{ secrets.RENDER_HOOK_API_PROD }}"

      - name: Trigger Development Deploy (development)
        if: github.ref == 'refs/heads/development'
        run: curl "${{ secrets.RENDER_HOOK_API_DEVELOPMENT }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Production Deploy (main)
        if: github.ref == 'refs/heads/main'
        run: curl "${{ secrets.RENDER_HOOK_WEB_PROD }}"

      - name: Trigger Development Deploy (development)
        if: github.ref == 'refs/heads/development'
        run: curl "${{ secrets.RENDER_HOOK_WEB_DEVELOPMENT }}"