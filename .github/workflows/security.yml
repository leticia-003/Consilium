name: Security Scanning

on:
  push:
    branches:
      - '**'  # Run on push to any branch
  pull_request:
    branches:
      - '**'

jobs:
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['csharp', 'javascript']
        # CodeQL supports: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Initialize CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Query suites: 'default', 'security-extended', 'security-and-quality'
          queries: security-extended

      # Autobuild attempts to build any compiled languages (C/C++, C#, Go, Java, etc.)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Scan .NET dependencies
      - name: Restore .NET dependencies
        run: dotnet restore
        working-directory: ./src

      - name: Scan .NET dependencies for vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive || true
          dotnet list package --deprecated || true
        working-directory: ./src

      # Scan npm dependencies
      - name: Install npm dependencies
        run: npm ci
        working-directory: ./src/frontend

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        working-directory: ./src/frontend

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dependency-scan]
    if: always()
    
    steps:
      - name: Check security scan results
        run: |
          echo "CodeQL Analysis: ${{ needs.codeql-analysis.result }}"
          echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
          
          if [ "${{ needs.codeql-analysis.result }}" != "success" ] || [ "${{ needs.dependency-scan.result }}" != "success" ]; then
            echo "⚠️  Some security scans have issues - check the Security tab"
            # Don't fail the workflow, just warn
          else
            echo "✅ All security scans completed successfully!"
          fi
