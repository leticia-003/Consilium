services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-backend-prod
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Qdrant__Url=http://qdrant:6333

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-frontend-prod
    ports:
      - "4200:80"

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data: