version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-backend-prod
    ports:
      - "8080:8080"
    depends_on:
      - db
      - qdrant
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=db;Database=mydb;Username=postgres;Password=postgres
      - Qdrant__Url=http://qdrant:6333

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-frontend-prod
    ports:
      - "4200:80"

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
