services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-backend-prod

    ports:
      - "4200:4200"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm start -- --host 0.0.0.0"

  # qdrant:
