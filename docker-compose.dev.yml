services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: consilium_backend_dev
    
    command: >
      bash -c "dotnet watch run --project /src/Consilium.API/Consilium.API.csproj --no-launch-profile --urls http://+:8080"
    
    ports:
      - "8080:8080"
      
    volumes:
      - ./src:/src 
       
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    
  frontend:
    image: node:20
    container_name: consilium_frontend_dev
    
    working_dir: /app

    command: >
      bash -c "npm install && 
               npm start -- --host 0.0.0.0 --poll 1000"
               
    ports:
      - "4200:4200"
      
    volumes:
      - ./src/frontend:/app

